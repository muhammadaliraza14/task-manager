version: "3.8"

services:
  mongo:
    image: mongo
    ports:
      - "27017:27017"

  server:
    build: ./server
    ports:
      - "5001:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/taskhub
      - JWT_SECRET=secret

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server